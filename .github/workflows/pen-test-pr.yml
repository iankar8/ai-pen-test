name: Security Scan - Pull Request

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.py'
      - '**.js'
      - '**.jsx'
      - '**.ts'
      - '**.tsx'
      - '**.java'
      - '**.go'
      - '**.rb'
      - '**.php'
      - 'Dockerfile'
      - '**.dockerfile'
      - '**.yml'
      - '**.yaml'
      - '**.tf'
      - '**.json'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-scan:
    name: Security Assessment
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Get current + previous commit for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests python-dotenv aiohttp

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **.py
            **.js
            **.ts
            **.java
            **.go
            Dockerfile
            **.yml
            **.tf

      - name: Run SAST Analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m handlers.sast_analyzer \
            --scope changed_files \
            --files "${{ steps.changed-files.outputs.all_changed_files }}" \
            --output findings.json \
            --severity-threshold medium

      - name: Generate Security Report
        if: always()
        run: |
          python -m handlers.report_generator \
            --findings findings.json \
            --format markdown \
            --output security-report.md

      - name: Comment PR with findings
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Check severity threshold
        run: |
          python -c "
          import json
          import sys

          with open('findings.json', 'r') as f:
              findings = json.load(f)

          critical = len([f for f in findings if f.get('severity') == 'CRITICAL'])
          high = len([f for f in findings if f.get('severity') == 'HIGH'])

          if critical > 0:
              print(f'Found {critical} CRITICAL vulnerabilities - blocking PR')
              sys.exit(1)
          elif high > 0:
              print(f'Found {high} HIGH vulnerabilities - review required')
              # Uncomment to block on HIGH findings:
              # sys.exit(1)
          else:
              print('No critical or high vulnerabilities found')
          "

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-findings
          path: |
            findings.json
            security-report.md
          retention-days: 30

      - name: Create GitHub Issues for Critical Findings
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('findings.json', 'utf8'));

            const critical = findings.filter(f => f.severity === 'CRITICAL');

            for (const finding of critical.slice(0, 5)) {  // Limit to 5 issues
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Security] ${finding.category} in ${finding.file}`,
                body: `
## Critical Security Vulnerability

**File**: \`${finding.file}:${finding.line}\`
**Category**: ${finding.category}
**CWE**: ${finding.cwe}
**CVSS**: ${finding.cvss_score}

### Description
${finding.description}

### Impact
${finding.impact}

### Remediation
${finding.remediation}

---
*Auto-generated by ai-pen-test*
*PR: #${context.issue.number}*
                `,
                labels: ['security', 'critical', 'automated']
              });
            }

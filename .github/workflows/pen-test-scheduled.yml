name: Security Scan - Scheduled Full Scan

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'

  workflow_dispatch:  # Allow manual triggering
    inputs:
      severity_threshold:
        description: 'Minimum severity to report'
        required: true
        default: 'LOW'
        type: choice
        options:
          - CRITICAL
          - HIGH
          - MEDIUM
          - LOW
          - INFO

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  full-security-scan:
    name: Comprehensive Security Assessment
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        scan-type: [sast, dependencies, infrastructure]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests python-dotenv aiohttp safety bandit

      - name: Run SAST Full Scan
        if: matrix.scan-type == 'sast'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m handlers.sast_analyzer \
            --scope full_codebase \
            --output findings-sast.json \
            --severity-threshold ${{ inputs.severity_threshold || 'LOW' }}

      - name: Dependency Vulnerability Scan
        if: matrix.scan-type == 'dependencies'
        run: |
          # Python dependencies
          if [ -f requirements.txt ]; then
            safety check --json --output findings-deps.json || true
          fi

          # JavaScript dependencies
          if [ -f package.json ]; then
            npm audit --json > findings-npm.json || true
          fi

      - name: Infrastructure Security Scan
        if: matrix.scan-type == 'infrastructure'
        run: |
          # Terraform scanning
          if [ -d terraform ] || [ -f "*.tf" ]; then
            echo "Scanning Terraform configurations..."
            # In production, use tools like tfsec, checkov
          fi

          # Docker scanning
          if [ -f Dockerfile ]; then
            echo "Scanning Dockerfile..."
            # In production, use tools like trivy, hadolint
          fi

          # Kubernetes scanning
          if [ -d k8s ] || [ -f "*.yaml" ]; then
            echo "Scanning Kubernetes manifests..."
            # In production, use tools like kubesec, kube-bench
          fi

      - name: Aggregate Findings
        run: |
          python -c "
          import json
          import glob

          all_findings = []

          for file in glob.glob('findings-*.json'):
              try:
                  with open(file, 'r') as f:
                      data = json.load(f)
                      if isinstance(data, list):
                          all_findings.extend(data)
                      elif isinstance(data, dict) and 'findings' in data:
                          all_findings.extend(data['findings'])
              except Exception as e:
                  print(f'Error reading {file}: {e}')

          with open('findings-aggregated.json', 'w') as f:
              json.dump(all_findings, f, indent=2)

          print(f'Aggregated {len(all_findings)} findings')
          "

      - name: Generate Comprehensive Report
        run: |
          python -m handlers.report_generator \
            --findings findings-aggregated.json \
            --format html \
            --output report.html

          python -m handlers.report_generator \
            --findings findings-aggregated.json \
            --format json \
            --output report.json

      - name: Upload Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: |
            report.html
            report.json
            findings-*.json
          retention-days: 90

      - name: Create Summary Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('findings-aggregated.json', 'utf8'));

            const bySeverity = {
              CRITICAL: findings.filter(f => f.severity === 'CRITICAL').length,
              HIGH: findings.filter(f => f.severity === 'HIGH').length,
              MEDIUM: findings.filter(f => f.severity === 'MEDIUM').length,
              LOW: findings.filter(f => f.severity === 'LOW').length,
              INFO: findings.filter(f => f.severity === 'INFO').length
            };

            const body = `
# Weekly Security Scan Results

**Scan Date**: ${new Date().toISOString().split('T')[0]}
**Total Findings**: ${findings.length}

## Severity Breakdown

| Severity | Count |
|----------|-------|
| Critical | ${bySeverity.CRITICAL} |
| High | ${bySeverity.HIGH} |
| Medium | ${bySeverity.MEDIUM} |
| Low | ${bySeverity.LOW} |
| Info | ${bySeverity.INFO} |

## Top Findings

${findings.slice(0, 5).map((f, i) => `
### ${i+1}. ${f.category} (${f.severity})
- **File**: \`${f.file}:${f.line}\`
- **Description**: ${f.description}
`).join('\n')}

---

**Full Report**: [Download Artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

*Auto-generated by ai-pen-test - Scheduled Scan*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Security Scan - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['security', 'automated', 'weekly-scan']
            });

      - name: Notify on Critical Findings
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            try {
              const findings = JSON.parse(fs.readFileSync('findings-aggregated.json', 'utf8'));
              const critical = findings.filter(f => f.severity === 'CRITICAL');

              if (critical.length > 0) {
                core.setFailed(`Found ${critical.length} CRITICAL vulnerabilities!`);
                console.log(`ALERT: ${critical.length} critical vulnerabilities detected!`);
              }
            } catch (e) {
              console.log('No findings file found or error reading findings');
            }
